<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Chat Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        .chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            padding: 10px;
            background: #f8f9fa;
            margin-bottom: 10px;
        }

        .message {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            max-width: 70%;
        }

        .message.sent {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.received {
            background: #e9ecef;
            color: black;
        }

        .timestamp {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .user-section {
            border: 2px solid #dee2e6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .online-indicator.online {
            background: #28a745;
        }

        .online-indicator.offline {
            background: #dc3545;
        }

        .conversation-item {
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
            cursor: pointer;
        }

        .conversation-item:hover {
            background: #f8f9fa;
        }

        .unread-badge {
            background: #dc3545;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="container mt-4">
        <h1 class="mb-4">🗨️ Direct Chat Test</h1>

        <div class="row">
            <!-- User 1 -->
            <div class="col-md-6">
                <div class="user-section">
                    <h3>
                        <span id="u1Status" class="online-indicator offline"></span>
                        User 1
                    </h3>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="u1Email" class="form-control" value="user01@yopmail.com"
                            placeholder="Email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="u1Password" class="form-control" value="securePassword123"
                            placeholder="Password">
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="loginUser(1)">Login</button>
                    <button class="btn btn-success btn-sm" onclick="connectSocket(1)">Connect Socket</button>
                    <button class="btn btn-info btn-sm" onclick="loadConversations(1)">Load Conversations</button>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label">
                            Recipient User ID
                            <small class="text-muted">(User 2's userId from API)</small>
                        </label>
                        <input type="text" id="u1RecipientId" class="form-control" placeholder="Paste User 2's userId">
                    </div>

                    <h5 class="mt-3">💬 Chat</h5>
                    <div id="u1Chat" class="chat-box"></div>
                    <div class="input-group">
                        <input type="text" id="u1Message" class="form-control" placeholder="Type message..."
                            onkeypress="if(event.key==='Enter') sendDirectMessage(1)">
                        <button class="btn btn-primary" onclick="sendDirectMessage(1)">Send</button>
                    </div>

                    <div class="mt-3">
                        <small id="u1Info" class="text-muted"></small>
                    </div>
                </div>
            </div>

            <!-- User 2 -->
            <div class="col-md-6">
                <div class="user-section">
                    <h3>
                        <span id="u2Status" class="online-indicator offline"></span>
                        User 2
                    </h3>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="u2Email" class="form-control" value="user02@yopmail.com"
                            placeholder="Email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="u2Password" class="form-control" value="securePassword123"
                            placeholder="Password">
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="loginUser(2)">Login</button>
                    <button class="btn btn-success btn-sm" onclick="connectSocket(2)">Connect Socket</button>
                    <button class="btn btn-info btn-sm" onclick="loadConversations(2)">Load Conversations</button>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label">
                            Recipient User ID
                            <small class="text-muted">(User 1's userId from API)</small>
                        </label>
                        <input type="text" id="u2RecipientId" class="form-control" placeholder="Paste User 1's userId">
                    </div>

                    <h5 class="mt-3">💬 Chat</h5>
                    <div id="u2Chat" class="chat-box"></div>
                    <div class="input-group">
                        <input type="text" id="u2Message" class="form-control" placeholder="Type message..."
                            onkeypress="if(event.key==='Enter') sendDirectMessage(2)">
                        <button class="btn btn-primary" onclick="sendDirectMessage(2)">Send</button>
                    </div>

                    <div class="mt-3">
                        <small id="u2Info" class="text-muted"></small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Test Section -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>⚡ Quick Test</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success" onclick="quickTest()">
                            Run Complete Test Flow
                        </button>
                        <small class="text-muted ms-3">
                            (Login both → Connect sockets → Auto-fill recipient IDs → Ready to chat)
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <!-- API Logs -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>📋 API Logs</h5>
                        <button class="btn btn-sm btn-secondary" onclick="clearLogs()">Clear</button>
                    </div>
                    <div class="card-body">
                        <pre id="apiLogs" style="max-height: 300px; overflow-y: auto; font-size: 0.85rem;"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/v1';
        const SOCKET_URL = 'http://localhost:5000';

        const state = {
            u1: { token: null, userId: null, username: null, socket: null },
            u2: { token: null, userId: null, username: null, socket: null }
        };

        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'blue';
            document.getElementById('apiLogs').innerHTML +=
                `<span style="color: ${color}">[${timestamp}] ${msg}</span>\n`;
            console.log(msg);
        }

        function clearLogs() {
            document.getElementById('apiLogs').innerHTML = '';
        }

        function updateStatus(user, online) {
            const el = document.getElementById(`u${user}Status`);
            el.className = `online-indicator ${online ? 'online' : 'offline'}`;
        }

        function updateInfo(user, text) {
            document.getElementById(`u${user}Info`).textContent = text;
        }

        function displayMessage(user, senderId, content, timestamp, isSent) {
            const chatBox = document.getElementById(`u${user}Chat`);
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `
        <div>${content}</div>
        <div class="timestamp">${new Date(timestamp).toLocaleTimeString()}</div>
      `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function loginUser(user) {
            try {
                const email = document.getElementById(`u${user}Email`).value;
                const password = document.getElementById(`u${user}Password`).value;

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.status) {
                    state[`u${user}`].token = data.data.token;
                    state[`u${user}`].userId = data.data.user._id;
                    state[`u${user}`].username = data.data.user.username;

                    log(`✅ User ${user} logged in: ${data.data.user.username} (${data.data.user._id})`, 'success');
                    updateInfo(user, `Token: ${data.data.token.substring(0, 20)}... | UserID: ${data.data.user._id}`);
                } else {
                    log(`❌ User ${user} login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ User ${user} login error: ${error.message}`, 'error');
            }
        }

        function connectSocket(user) {
            const userData = state[`u${user}`];

            if (!userData.token) {
                log(`❌ User ${user}: Please login first`, 'error');
                return;
            }

            if (userData.socket) {
                log(`⚠️ User ${user}: Socket already connected`, 'error');
                return;
            }

            const socket = io(SOCKET_URL, {
                extraHeaders: { token: userData.token }
            });

            socket.on('connect', () => {
                log(`✅ User ${user} socket connected: ${socket.id}`, 'success');
                updateStatus(user, true);

                // Authenticate
                socket.emit('authenticate', {
                    socketId: socket.id,
                    userId: userData.userId
                });
            });

            socket.on('disconnect', () => {
                log(`❌ User ${user} socket disconnected`, 'error');
                updateStatus(user, false);
            });

            // Listen for direct messages
            socket.on('direct_message', (data) => {
                log(`💬 User ${user} received direct message from ${data.senderUsername}`, 'info');
                const isSent = data.senderId === userData.userId;
                displayMessage(user, data.senderId, data.content, data.timestamp, isSent);
            });

            socket.on('error', (error) => {
                log(`❌ User ${user} socket error: ${error.message || JSON.stringify(error)}`, 'error');
            });

            userData.socket = socket;
        }

        function sendDirectMessage(user) {
            const userData = state[`u${user}`];
            const recipientId = document.getElementById(`u${user}RecipientId`).value;
            const message = document.getElementById(`u${user}Message`).value;

            if (!userData.socket) {
                log(`❌ User ${user}: Socket not connected`, 'error');
                return;
            }

            if (!recipientId) {
                log(`❌ User ${user}: Please enter recipient ID`, 'error');
                return;
            }

            if (!message.trim()) {
                log(`❌ User ${user}: Message cannot be empty`, 'error');
                return;
            }

            userData.socket.emit('direct_message', {
                recipientId,
                messageType: 'TEXT',
                content: message
            });

            log(`📤 User ${user} sent message: "${message}" to ${recipientId}`, 'info');
            document.getElementById(`u${user}Message`).value = '';
        }

        async function loadConversations(user) {
            try {
                const userData = state[`u${user}`];

                if (!userData.token) {
                    log(`❌ User ${user}: Please login first`, 'error');
                    return;
                }

                const response = await fetch(`${API_URL}/chat/conversations`, {
                    headers: {
                        'Authorization': `Bearer ${userData.token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    log(`✅ User ${user} loaded ${data.data.length} conversations`, 'success');
                    console.log('Conversations:', data.data);
                } else {
                    log(`❌ User ${user} failed to load conversations: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ User ${user} load conversations error: ${error.message}`, 'error');
            }
        }

        async function quickTest() {
            log('🚀 Starting quick test flow...', 'info');

            // Step 1: Login both users
            await loginUser(1);
            await new Promise(resolve => setTimeout(resolve, 500));
            await loginUser(2);
            await new Promise(resolve => setTimeout(resolve, 500));

            // Step 2: Connect sockets
            connectSocket(1);
            await new Promise(resolve => setTimeout(resolve, 500));
            connectSocket(2);
            await new Promise(resolve => setTimeout(resolve, 1000));

            // Step 3: Auto-fill recipient IDs
            if (state.u1.userId && state.u2.userId) {
                document.getElementById('u1RecipientId').value = state.u2.userId;
                document.getElementById('u2RecipientId').value = state.u1.userId;
                log('✅ Recipient IDs auto-filled', 'success');
            }

            log('✅ Quick test complete! Ready to send messages.', 'success');
        }
    </script>
</body>

</html>
